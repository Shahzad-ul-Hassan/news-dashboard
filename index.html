<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Market & News Intelligence Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header">
    <div class="header-top">
      <div class="timings" id="timings"></div>

      <div class="controls">
        <div class="lang-toggle" role="group" aria-label="Language toggle">
          <button id="btnLangEn" class="btn small active" type="button">EN</button>
          <button id="btnLangUr" class="btn small" type="button">اردو</button>
        </div>

        <input
          id="globalSearch"
          class="search"
          type="search"
          placeholder="Search news (Fed, BTC, CPI, USD/PKR...)"
        />
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Sessions row -->
    <section class="sessions" id="sessions"></section>

    <!-- Watchlist / Markets -->
    <section class="markets" id="markets"></section>

    <!-- News -->
    <section class="news-list" id="news"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
