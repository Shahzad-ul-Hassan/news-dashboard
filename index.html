<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Market & News Intelligence Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header">
    <div class="header-top">
      <!-- Sessions/Timings row -->
      <div class="timings" id="timings"></div>

      <div class="controls">
        <div class="lang-toggle" role="group" aria-label="Language toggle">
          <button id="btnLangEn" class="btn small active" type="button">EN</button>
          <button id="btnLangUr" class="btn small" type="button">اردو</button>
        </div>

        <input
          id="globalSearch"
          class="search"
          type="search"
          placeholder="Search news (Fed, BTC, CPI, USD/PKR...)"
        />
      </div>
    </div>

    <!-- Rates strip -->
    <div class="rates-strip" id="ratesStrip"></div>
  </header>

  <main class="layout">
    <!-- Left: Watchlist -->
    <aside class="sidebar left" id="watchlist"></aside>

    <!-- Center: News -->
    <section class="center">
      <div class="filters" id="filters"></div>
      <div class="news-list" id="news"></div>
      <div class="news-list" id="newsFeed"></div>
    </section>

    <!-- Right: Signals / Sessions -->
    <aside class="sidebar right">
      <div class="panel" id="signals"></div>
      <div class="panel" id="sessions"></div>
      <div class="panel" id="sessionsPanel"></div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
