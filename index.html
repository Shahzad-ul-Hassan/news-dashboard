<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Market & News Intelligence Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header">
    <div class="header-top">
      <div class="timings" id="timings"></div>

      <div class="controls">
        <div class="lang-toggle" role="group" aria-label="Language toggle">
          <button id="btnLangEn" class="btn small active" type="button">EN</button>
          <button id="btnLangUr" class="btn small" type="button">اردو</button>
        </div>

        <input id="globalSearch" class="search" type="search"
               placeholder="Search news (Fed, BTC, CPI, USD...)" />
      </div>
    </div>

    <div class="rates-strip" id="ratesStrip"></div>
  </header>

  <main class="layout">
    <!-- Left: Watchlist -->
    <aside class="sidebar left">
      <h3>Watchlist</h3>
      <div class="tabs">
        <button class="tab active" data-tab="crypto" type="button">Crypto</button>
        <button class="tab" data-tab="stocks" type="button">Stocks</button>
        <button class="tab" data-tab="fx" type="button">FX</button>
      </div>
      <div id="watchlist"></div>
    </aside>

    <!-- Center: News -->
    <section class="center">
      <div class="filters">
        <select id="filterCategory">
          <option value="all">All</option>
          <option value="crypto">Crypto</option>
          <option value="stocks_macro">Stocks/Macro</option>
          <option value="usa_decisions">USA Decisions</option>
        </select>

        <select id="filterImpact">
          <option value="all">All Impact</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>

        <input id="filterDate" type="date" />
        <button id="btnClear" class="btn small" type="button">Clear</button>
      </div>

      <div class="news-list" id="news"></div>

      <button id="btnLoadMore" class="btn" type="button" style="margin-top:10px">Load more</button>
    </section>

    <!-- Right: Panels -->
    <aside class="sidebar right">
      <div class="panel">
        <h3>Active Signals</h3>
        <div id="signals"></div>
      </div>

      <div class="panel">
        <h3>Session Trend</h3>
        <div id="sessionsPanel"></div>
      </div>

      <div class="panel">
        <h3>Impact Validation</h3>
        <div id="impact"></div>
      </div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
